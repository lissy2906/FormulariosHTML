<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Médico Rosado</title>
    <link rel="stylesheet" href="Medform.css">
</head>
<body>
    <div class="form-container">
        <header class="header">
            <div class="logo-placeholder">■</div>
            <div class="header-text">
                <h1>FORMULARIO MÉDICO</h1>
                <p>NOMBRE DEL CENTRO MÉDICO</p>
            </div>
        </header>

        <form>
            <section>
                <h2>INFORMACIÓN DEL PACIENTE</h2>
                <div class="input-group">
                    <label>Nombre y Apellidos:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Fecha de Nacimiento:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Dirección:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Teléfono:</label>
                    <input type="tel">
                </div>
                <div class="input-group inline">
                    <label>Sexo:</label>
                    <label class="checkbox-label"><input type="checkbox"> Masculino</label>
                    <label class="checkbox-label"><input type="checkbox"> Femenino</label>
                    <label class="checkbox-label"><input type="checkbox"> Otro</label>
                </div>
                <div class="input-group">
                    <label>Código Postal:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Correo Electrónico:</label>
                    <input type="email">
                </div>
            </section>

            <section>
                <div class="section-header">
                    <h2>MOTIVO DE LA VISITA</h2>
                    <span class="instruction">Describir los síntomas o el motivo de esta visita</span>
                </div>
                <div class="dotted-lines">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </section>

            <section>
                <h2>INFORMACIÓN DEL SEGURO</h2>
                <div class="input-group">
                    <label>Seguro Proveniente:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Número de Póliza:</label>
                    <input type="text">
                </div>
            </section>

            <section>
                <h2>INFORMACIÓN DE CONTACTO EN CASO DE EMERGENCIA</h2>
                <div class="input-group">
                    <label>Nombre y Apellidos:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Número de Teléfono:</label>
                    <input type="tel">
                </div>
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email">
                </div>
            </section>

            <div class="footer-sign">
                <div class="date">04/10/2025</div>
                <div class="signature">
                    <div class="sign-line"></div>
                    <span>Nombre y Apellidos</span>
                </div>
            </div>
        </form>

        <footer class="footer">
            <div class="footer-info">
                <span>WWW.YOURFAVORITEWEBHERE.COM</span>
                <span>@tuperfilaqui</span>
            </div>
            <div class="tu-logo">TU LOGO</div>
        </footer>
    </div>
</body>
</html>
