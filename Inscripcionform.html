<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <title>Formulario de Inscripcion</title>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="hoja">
        <div class="sidebar">
            <div class="icon-bar"></div>
            <div class="icon-bar"></div>
            <div class="icon-bar"></div>
        </div>

        <div class="content">
            <div class="header">
                <h1>FORMULARIO DE INSCRIPCIÓN</h1>
                <a href="#" class="web-link">www.yourfavoritewebhere.com</a>
            </div>

            <div class="sidebar-text">Plantilla de Formulario de Inscripción</div>

            <form>
                <div class="form-row">
                    <label>Solicitud de ingreso a:</label>
                    <input type="text" placeholder=" Escribe aquí">
                </div>

                <div class="form-row">
                    <label>Director</label>
                    <input type="text">
                </div>

                <div class="form-row">
                    <label>Tipo de Afiliación</label>
                    <div class="options-group">
                        <div class="option-item"><span class="purple-square"></span> Bronce</div>
                        <div class="option-item"><span class="purple-square"></span> Plata</div>
                        <div class="option-item"><span class="purple-square"></span> Oro</div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Solicitante/s</label>
                    <input type="text">
                </div>

                <div class="two-cols">
                    <div class="form-row">
                        <label>Nombre y Apellido</label>
                        <input type="text">
                    </div>
                    <div class="form-row">
                        <label>Dirección</label>
                        <input type="text">
                    </div>
                </div>

                <div class="two-cols">
                    <div class="form-row">
                        <label>Fecha de Nacimiento</label>
                        <input type="text" placeholder="DD/MM/AAAA">
                    </div>
                    <div class="form-row">
                        <label>Nacionalidad</label>
                        <input type="text">
                    </div>
                </div>

                <div class="two-cols">
                    <div class="form-row">
                        <label>Sexo</label>
                        <input type="text">
                    </div>
                    <div class="form-row">
                        <label>Código</label>
                        <input type="text">
                    </div>
                </div>

                <div class="form-row">
                    <label>Ciudad/País</label>
                    <input type="text">
                </div>

                <div class="form-row">
                    <label>Correo Electrónico</label>
                    <div style="display: flex; align-items: center;">
                        <span style="color:#6f3f80;  margin-right:10px; font-weight:bold;">@</span>
                        <input type="email" style="flex:1;">
                    </div>
                </div>

                <div class="two-cols">
                    <div class="form-row">
                        <label>Permiso de Conducir</label>
                        <input type="text">
                    </div>
                    <div class="form-row">
                        <label>Otro Número de Tarjeta</label>
                        <input type="text">
                    </div>
                </div>

                <p class="footer-note">
                    Compruebe que el contenido del formulario contenga correctamente sus datos personales.<br>
                    Personaliza online un formulario de registro en Lissy.org
                </p>

                <img src="assets/img/Logo.jpg" class="logo">

                <div class="signature">
                    <input type="text">
                    <label style="font-size: 12px; margin-top:5px;">Firma/Fecha</label>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
