<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Admisión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="FormularioAdm.css">
</head>
<body>

    <div class="form-container">
        <div class="sidebar-left">www.yourfavoritewebhere.com</div>

        <div class="content">
            <header>
                <div class="header-text">
                    <h1>FORMULARIO<br>DE ADMISIÓN</h1>
                    <p class="subtitle">¡Bienvenido al proceso de admisión!</p>
                    <p class="caption">Plantillas editables de Lissy.org para crear un formulario de paciente o cliente</p>
                </div>
               
            </header>

            <section class="section-title">DATOS PERSONALES</section>

            <form>
                <div class="input-group">
                    <label>NOMBRE Y APELLIDOS</label>
                    <input type="text" value="RONNY MONTAS">
                </div>

                <div class="row">
                    <div class="input-group flex-2">
                        <label>FECHA DE NACIMIENTO</label>
                        <input type="text" value="06/02/2009">
                    </div>
                    <div class="input-group flex-1">
                        <label>SEXO</label>
                        <div class="radio-group">
                            <label><span class="box"></span> Masculino</label>
                            <label><span class="box"></span> Femenino</label>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>NÚMERO DE TELÉFONO</label>
                    <input type="text" value="8298487740">
                </div>

                <div class="input-group bg-field">
                    <label>DIRECCIÓN</label>
                    <input type="text">
                </div>

                <div class="row">
                    <div class="input-group bg-field">
                        <label>CIUDAD</label>
                        <input type="text">
                    </div>
                    <div class="input-group bg-field">
                        <label>REGIÓN</label>
                        <input type="text">
                    </div>
                </div>

                <div class="row">
                    <div class="input-group bg-field">
                        <label>CÓDIGO POSTAL</label>
                        <input type="text">
                    </div>
                    <div class="input-group bg-field">
                        <label>PAÍS</label>
                        <input type="text">
                    </div>
                </div>

                <div class="input-group bg-field">
                    <label>CORREO ELECTRÓNICO</label>
                    <input type="email">
                </div>

                <footer>
                    <p class="footer-note">Compruebe que el contenido del formulario contiene correctamente sus datos personales.</p>
                    <div class="signature">
                        <div class="line"></div>
                        <span>Firma/Fecha</span>
                    </div>
                </footer>
            </form>
        </div>

        <div class="sidebar-right"></div>
    </div>

</body>
</html>
